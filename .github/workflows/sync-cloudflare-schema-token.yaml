---
name: Sync Cloudflare Schema Token

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync token into 1Password
    runs-on: home-ops-runner
    steps:
      - name: Install 1Password CLI
        run: |
          curl -fsSL https://cache.agilebits.com/dist/1P/op2/pkg/v2.34.0/op_linux_amd64_v2.34.0.zip -o "$RUNNER_TEMP/op.zip"
          unzip -o -q "$RUNNER_TEMP/op.zip" -d "$RUNNER_TEMP/op"
          chmod +x "$RUNNER_TEMP/op/op"
          echo "$RUNNER_TEMP/op" >> "$GITHUB_PATH"

      - name: Copy GitHub Cloudflare token to 1Password
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_SCHEMA_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_SCHEMA_TOKEN"
          op item get cloudflare --vault Kubernetes --format json > "$RUNNER_TEMP/cloudflare-item.json"
          python3 - <<'PY2'
          import json, os
          src = os.environ['RUNNER_TEMP'] + '/cloudflare-item.json'
          dst = os.environ['RUNNER_TEMP'] + '/cloudflare-updated.json'
          item = json.load(open(src))
          token = os.environ['CLOUDFLARE_SCHEMA_TOKEN']
          for field in item.get('fields', []):
              if field.get('label') == 'CLOUDFLARE_SCHEMA_TOKEN':
                  field['value'] = token
                  break
          else:
              item.setdefault('fields', []).append({
                  'label': 'CLOUDFLARE_SCHEMA_TOKEN',
                  'type': 'CONCEALED',
                  'value': token,
              })
          json.dump(item, open(dst, 'w'))
          PY2
          op item edit cloudflare --vault Kubernetes --template "$RUNNER_TEMP/cloudflare-updated.json" >/dev/null
          op item get cloudflare --vault Kubernetes --format json > "$RUNNER_TEMP/cloudflare-verify.json"
          python3 - <<'PY2'
          import json, os
          item = json.load(open(os.environ['RUNNER_TEMP'] + '/cloudflare-verify.json'))
          ok = any(field.get('label') == 'CLOUDFLARE_SCHEMA_TOKEN' and field.get('value') for field in item.get('fields', []))
          print('CLOUDFLARE_SCHEMA_TOKEN_PRESENT=' + str(ok).lower())
          raise SystemExit(0 if ok else 1)
          PY2
