---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: spark-vllm-usage
spec:
  groups:
    - name: spark-vllm-usage
      interval: 1m
      rules:
        - record: spark:vllm_prompt_tokens_total
          expr: sum by (model_name, spark_service) (vllm:prompt_tokens_total{job=~"spark-vllm-.+"})
        - record: spark:vllm_generation_tokens_total
          expr: sum by (model_name, spark_service) (vllm:generation_tokens_total{job=~"spark-vllm-.+"})
        - record: spark:vllm_prompt_tokens_1d
          expr: sum by (model_name, spark_service) (increase(vllm:prompt_tokens_total{job=~"spark-vllm-.+"}[1d]))
        - record: spark:vllm_generation_tokens_1d
          expr: sum by (model_name, spark_service) (increase(vllm:generation_tokens_total{job=~"spark-vllm-.+"}[1d]))
        - record: spark:gemma4_openrouter_equivalent_usd_1d
          expr: sum(increase(vllm:prompt_tokens_total{job="spark-vllm-gemma"}[1d]) * 0.00000006) + sum(increase(vllm:generation_tokens_total{job="spark-vllm-gemma"}[1d]) * 0.00000033)
        - record: spark:zerank2_zeroentropy_equivalent_usd_1d
          expr: sum(increase(vllm:prompt_tokens_total{job="spark-vllm-zerank"}[1d]) * 0.000000025)
        - record: spark:hosted_equivalent_usd_1d
          expr: spark:gemma4_openrouter_equivalent_usd_1d + spark:zerank2_zeroentropy_equivalent_usd_1d
        - record: spark:hosted_equivalent_usd_30d
          expr: sum(increase(vllm:prompt_tokens_total{job="spark-vllm-gemma"}[30d]) * 0.00000006) + sum(increase(vllm:generation_tokens_total{job="spark-vllm-gemma"}[30d]) * 0.00000033) + sum(increase(vllm:prompt_tokens_total{job="spark-vllm-zerank"}[30d]) * 0.000000025)
