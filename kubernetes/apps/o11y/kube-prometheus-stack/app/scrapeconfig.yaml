---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: spark-vllm-gemma
spec:
  staticConfigs:
    - targets:
        - spark.internal:8001
      labels:
        spark_service: gemma
        spark_model: gemma4-aeon-uncensored
  metricsPath: /metrics
  relabelings:
    - action: replace
      targetLabel: job
      replacement: spark-vllm-gemma
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
