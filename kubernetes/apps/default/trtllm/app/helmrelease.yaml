---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trtllm
spec:
  chartRef:
    kind: OCIRepository
    name: trtllm
  interval: 1h
  values:
    controllers:
      trtllm:
        type: statefulset
        strategy: RollingUpdate
        initContainers:
          # 1. Pull HF weights. Skip if already present.
          01-download-model:
            image: &trtllmImage
              repository: nvcr.io/nvidia/tensorrt-llm/release
              tag: 0.21.0  # TODO: pin to latest release that supports Qwen3 MoE
            command: ["/bin/bash", "-c"]
            args:
              - |
                set -euo pipefail
                HF_REPO="HauhauCS/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
                SRC_DIR="/workspace/hf/${HF_REPO##*/}"
                if [ -f "${SRC_DIR}/.complete" ]; then
                  echo "HF weights present, skipping."
                  exit 0
                fi
                mkdir -p "${SRC_DIR}"
                huggingface-cli download "${HF_REPO}" \
                  --local-dir "${SRC_DIR}" \
                  --exclude "*.gguf" "original/*"
                touch "${SRC_DIR}/.complete"
            envFrom:
              - secretRef:
                  name: trtllm-secret
          # 2. Quantize HF -> TRT-LLM checkpoint (INT4 AWQ + FP16 compute).
          02-quantize:
            image: *trtllmImage
            command: ["/bin/bash", "-c"]
            args:
              - |
                set -euo pipefail
                SRC_DIR="/workspace/hf/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive"
                CKPT_DIR="/workspace/ckpt/awq-int4"
                if [ -f "${CKPT_DIR}/.complete" ]; then
                  echo "AWQ checkpoint present, skipping."
                  exit 0
                fi
                mkdir -p "${CKPT_DIR}"
                # Unified quantize.py handles Qwen MoE; calibration pulled from HF datasets.
                python /app/tensorrt_llm/examples/quantization/quantize.py \
                  --model_dir "${SRC_DIR}" \
                  --output_dir "${CKPT_DIR}" \
                  --dtype float16 \
                  --qformat int4_awq \
                  --awq_block_size 128 \
                  --kv_cache_dtype int8 \
                  --calib_size 512
                touch "${CKPT_DIR}/.complete"
            envFrom:
              - secretRef:
                  name: trtllm-secret
            resources:
              requests:
                cpu: 4
                memory: 32Gi
                nvidia.com/gpu: 1
              limits:
                memory: 64Gi
                nvidia.com/gpu: 1
          # 3. Build TRT engines. GPU-specific (SM89/L4).
          03-build-engine:
            image: *trtllmImage
            command: ["/bin/bash", "-c"]
            args:
              - |
                set -euo pipefail
                CKPT_DIR="/workspace/ckpt/awq-int4"
                ENGINE_DIR="/workspace/engines/l4-awq-int4"
                if [ -f "${ENGINE_DIR}/.complete" ]; then
                  echo "Engine present, skipping."
                  exit 0
                fi
                mkdir -p "${ENGINE_DIR}"
                trtllm-build \
                  --checkpoint_dir "${CKPT_DIR}" \
                  --output_dir "${ENGINE_DIR}" \
                  --gemm_plugin auto \
                  --moe_plugin auto \
                  --use_paged_context_fmha enable \
                  --use_fused_mlp enable \
                  --max_batch_size 8 \
                  --max_input_len 8192 \
                  --max_seq_len 16384 \
                  --max_num_tokens 8192
                touch "${ENGINE_DIR}/.complete"
                # Free disk once engine is built.
                rm -rf /workspace/hf
            resources:
              requests:
                cpu: 4
                memory: 32Gi
                nvidia.com/gpu: 1
              limits:
                memory: 64Gi
                nvidia.com/gpu: 1
        containers:
          app:
            image: *trtllmImage
            command: ["/bin/bash", "-c"]
            args:
              - |
                exec trtllm-serve \
                  /workspace/engines/l4-awq-int4 \
                  --host 0.0.0.0 \
                  --port 8000 \
                  --tokenizer /workspace/ckpt/awq-int4 \
                  --max_batch_size 8 \
                  --kv_cache_free_gpu_memory_fraction 0.9
            env:
              TZ: America/New_York
              NVIDIA_DRIVER_CAPABILITIES: all
              NVIDIA_VISIBLE_DEVICES: all
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 30
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # Build steps on first boot can take 30-60m; bump if needed.
                  failureThreshold: 240
            resources:
              requests:
                cpu: 4
                memory: 4Gi
                nvidia.com/gpu: 1
              limits:
                memory: 24Gi
                nvidia.com/gpu: 1
        statefulset:
          volumeClaimTemplates:
            - name: workspace
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 150Gi
              globalMounts:
                - path: /workspace
    defaultPodOptions:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.feature.node.kubernetes.io/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hades.casa"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
