---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app trtllm
spec:
  chartRef:
    kind: OCIRepository
    name: trtllm
  interval: 1h
  values:
    controllers:
      trtllm:
        type: statefulset
        strategy: RollingUpdate
        initContainers:
          # Pull HF weights once; serve container will load directly.
          01-download-model:
            image: &trtllmImage
              repository: nvcr.io/nvidia/tensorrt-llm/release
              tag: 1.2.0  # PyTorch / LLM-API backend path
            command: ["/bin/bash", "-c"]
            args:
              - |
                set -euo pipefail
                HF_REPO="Qwen/Qwen3.6-35B-A3B-FP8"
                SRC_DIR="/workspace/hf/${HF_REPO##*/}"
                if [ -f "${SRC_DIR}/.complete" ]; then
                  echo "HF weights present, skipping."
                  exit 0
                fi
                mkdir -p "${SRC_DIR}"
                huggingface-cli download "${HF_REPO}" \
                  --local-dir "${SRC_DIR}"
                touch "${SRC_DIR}/.complete"
            envFrom:
              - secretRef:
                  name: trtllm-secret
        containers:
          app:
            image: *trtllmImage
            command: ["/bin/bash", "-c"]
            args:
              - |
                exec trtllm-serve \
                  /workspace/hf/Qwen3.6-35B-A3B-FP8 \
                  --host 0.0.0.0 \
                  --port 8000 \
                  --backend pytorch \
                  --max_batch_size 1 \
                  --max_num_tokens 8192 \
                  --max_seq_len 204800 \
                  --kv_cache_free_gpu_memory_fraction 0.90 \
                  --trust_remote_code \
                  --extra_llm_api_options /config/llm-api.yaml
            env:
              TZ: America/New_York
              NVIDIA_DRIVER_CAPABILITIES: all
              NVIDIA_VISIBLE_DEVICES: all
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8000
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 60
                  periodSeconds: 15
                  timeoutSeconds: 5
                  # First boot: HF download + model load can take a while.
                  failureThreshold: 240
            resources:
              requests:
                cpu: 4
                memory: 8Gi
                nvidia.com/gpu: 1
              limits:
                memory: 48Gi
                nvidia.com/gpu: 1
        statefulset:
          volumeClaimTemplates:
            - name: workspace
              storageClass: ceph-block
              accessMode: ReadWriteOnce
              size: 150Gi
              globalMounts:
                - path: /workspace
    defaultPodOptions:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.feature.node.kubernetes.io/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
    configMaps:
      llm-api:
        data:
          llm-api.yaml: |
            cuda_graph_config:
              enable_padding: true
              max_batch_size: 1
            kv_cache_config:
              enable_block_reuse: true
              free_gpu_memory_fraction: 0.90
              dtype: fp8
            moe_config:
              backend: CUTLASS
    persistence:
      llm-api:
        type: configMap
        name: "{{ .Release.Name }}-llm-api"
        globalMounts:
          - path: /config/llm-api.yaml
            subPath: llm-api.yaml
            readOnly: true
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hades.casa"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
