---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm
spec:
  interval: 30m
  timeout: 30m
  chart:
    spec:
      chart: vllm-stack
      version: 0.1.9
      sourceRef:
        kind: HelmRepository
        name: vllm
      interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  valuesFrom:
    - kind: Secret
      name: vllm-secret
      valuesKey: HF_TOKEN
      targetPath: servingEngineSpec.modelSpec[0].hf_token

  values:
    routerSpec:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          memory: 500Mi
        limits:
          memory: 2Gi
      route:
        main:
          enabled: true
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          hostnames:
            - vllm.hades.casa
          parentRefs:
            - name: envoy-internal
              namespace: network

    servingEngineSpec:
      runtimeClassName: nvidia

      modelSpec:
        - name: qwen-3-5-9b-abliterated
          repository: vllm/vllm-openai
          tag: nightly@sha256:e38b62beee4c79cbc9ce0a9d2865fe9dabbc383e172b2f7d8f68892d36f74c5d
          modelURL: lukey03/Qwen3.5-9B-abliterated
          replicaCount: 1

          requestCPU: 4
          requestMemory: 2Gi
          limitMemory: 24Gi
          requestGPU: 1

          pvcStorage: 50Gi
          pvcAccessMode:
            - ReadWriteOnce

          vllmConfig:
            enableChunkedPrefill: true
            enablePrefixCaching: true
            dtype: float16
            extraArgs:
              - "--trust-remote-code"
              - "--hf-overrides"
              - '{"model_type":"qwen3_5"}'
              - "--reasoning-parser"
              - "qwen3"
              - "--override-generation-config"
              - '{"temperature":1.0,"top_p":0.95,"top_k":20,"min_p":0.0,"presence_penalty":1.5,"repetition_penalty":1.0,"max_new_tokens":81920}'
              - "--gpu-memory-utilization"
              - "0.90"
              - "--max-num-seqs"
              - "32"

          shmSize: 8Gi

          env:
            - name: TZ
              value: America/New_York
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: NVIDIA_VISIBLE_DEVICES
              value: all

          nodeSelector:
            nvidia.feature.node.kubernetes.io/gpu: "true"

          tolerations:
            - key: nvidia.com/gpu
              operator: Exists
              effect: NoSchedule

    observabilitySpec:
      enabled: true
      serviceMonitor:
        enabled: true
