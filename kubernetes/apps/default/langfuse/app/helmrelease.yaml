---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: langfuse
spec:
  interval: 1h
  chart:
    spec:
      # renovate: registryUrl=https://langfuse.github.io/langfuse-k8s
      chart: langfuse
      version: 1.5.34
      sourceRef:
        kind: HelmRepository
        name: langfuse-charts
      interval: 15m
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    fullnameOverride: langfuse
    global:
      security:
        allowInsecureImages: true

    langfuse:
      deployment:
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
      pod:
        annotations:
          reloader.stakater.com/auto: "true"
      logging:
        level: info
        format: text
      salt:
        secretKeyRef:
          name: langfuse-secret
          key: salt
      encryptionKey:
        secretKeyRef:
          name: langfuse-secret
          key: encryption-key
      features:
        telemetryEnabled: false
        signUpDisabled: true
        experimentalFeaturesEnabled: false
      nextauth:
        url: https://langfuse.hades.casa
        secret:
          secretKeyRef:
            name: langfuse-secret
            key: nextauth-secret
      web:
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        pdb:
          create: false
        livenessProbe:
          initialDelaySeconds: 60
          failureThreshold: 6
        readinessProbe:
          initialDelaySeconds: 30
          failureThreshold: 12
      worker:
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        pdb:
          create: false
        livenessProbe:
          initialDelaySeconds: 60
          failureThreshold: 6

    postgresql:
      deploy: false
      host: postgres.database.svc.cluster.local
      port: 5432
      auth:
        username: langfuse
        database: langfuse
        existingSecret: langfuse-secret
        secretKeys:
          adminPasswordKey: LANGFUSE_POSTGRES_PASSWORD
          userPasswordKey: LANGFUSE_POSTGRES_PASSWORD

    redis:
      deploy: false
      host: valkey.database.svc.cluster.local
      port: 6379
      auth:
        username: default
        existingSecret: langfuse-secret
        existingSecretPasswordKey: VALKEY_PASSWORD
        database: 0

    clickhouse:
      deploy: true
      logLevel: warning
      clusterEnabled: false
      shards: 1
      replicaCount: 1
      auth:
        existingSecret: langfuse-secret
        existingSecretKey: clickhouse-password
      zookeeper:
        enabled: false
      persistence:
        storageClass: ceph-block
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 4Gi

    s3:
      deploy: false
      bucket: langfuse
      region: auto
      endpoint: http://minio.database.svc.cluster.local:9000
      forcePathStyle: true
      accessKeyId:
        secretKeyRef:
          name: langfuse-secret
          key: MINIO_LANGFUSE_ACCESS_KEY
      secretAccessKey:
        secretKeyRef:
          name: langfuse-secret
          key: MINIO_LANGFUSE_SECRET_KEY
