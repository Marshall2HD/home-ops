---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 1h
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: dev@sha256:ab5d78be39d38986b3d75e9d6dbb91769a1eddbccebce8cc78d9256a0e19defd
            env:
              DATA_DIR: /app/backend/data
              HOME: /app/backend/data
              ENABLE_OPENAI_API: "true"
              OPENAI_API_BASE_URLS: "http://llama.default.svc.cluster.local:8080/v1"
              OPENAI_API_KEYS: "not-needed"
              ENABLE_OLLAMA_API: "false"
              ENABLE_SIGNUP: "false"
              WEBUI_URL: "https://chat.hades.casa"
              ENABLE_RESPONSES_API_STATEFUL: "true"
              CHAT_STREAM_RESPONSE_CHUNK_MAX_BUFFER_SIZE: "65536"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: OPEN_WEBUI_DATABASE_URL
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  periodSeconds: 1
                  failureThreshold: 600
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
    service:
      app:
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hades.casa"
          - chat.hades.casa
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/backend/data
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 64Mi
        globalMounts:
          - path: /tmp
