---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: open-webui
  interval: 1h
  values:
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: dev@sha256:33d2793b69a0d2cb3e8051e69ab87da3d34587fbcce67e383ffd4381df4016d5
            env:
              DATA_DIR: /app/backend/data
              HOME: /app/backend/data
              ENABLE_OPENAI_API: "true"
              OPENAI_API_BASE_URLS: "http://llama.default.svc.cluster.local:8080/v1"
              OPENAI_API_KEYS: "not-needed"
              ENABLE_OLLAMA_API: "false"
              ENABLE_SIGNUP: "false"
              WEBUI_URL: "https://chat.hades.casa"
              ENABLE_RESPONSES_API_STATEFUL: "true"
              CHAT_STREAM_RESPONSE_CHUNK_MAX_BUFFER_SIZE: "65536"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: open-webui-secret
                    key: OPEN_WEBUI_DATABASE_URL
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                <<: *probes
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 120
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.hades.casa"
          - chat.hades.casa
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/backend/data
      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 64Mi
        globalMounts:
          - path: /tmp
