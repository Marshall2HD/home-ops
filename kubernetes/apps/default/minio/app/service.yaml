---
apiVersion: v1
kind: Service
metadata:
  name: minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 9000
      targetPort: s3
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: object-storage
