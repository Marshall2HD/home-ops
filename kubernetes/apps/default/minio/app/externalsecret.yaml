---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio
spec:
  refreshPolicy: CreatedOnce
  target:
    name: minio-secret
    creationPolicy: Orphan
    template:
      engineVersion: v2
      data:
        MINIO_ROOT_USER: "minio-root"
        MINIO_ROOT_PASSWORD: "{{ .MINIO_ROOT_PASSWORD }}"
        MINIO_LANGFUSE_ACCESS_KEY: "langfuse"
        MINIO_LANGFUSE_SECRET_KEY: "{{ .MINIO_LANGFUSE_SECRET_KEY }}"
        MINIO_OPEN_WEBUI_ACCESS_KEY: "open-webui"
        MINIO_OPEN_WEBUI_SECRET_KEY: "{{ .MINIO_OPEN_WEBUI_SECRET_KEY }}"
        LANGFUSE_S3_ENDPOINT: "http://minio.default.svc.cluster.local:9000"
        LANGFUSE_S3_BUCKET: "langfuse"
        OPEN_WEBUI_S3_ENDPOINT_URL: "http://minio.default.svc.cluster.local:9000"
        OPEN_WEBUI_S3_BUCKET_NAME: "open-webui"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: minio-passwords
