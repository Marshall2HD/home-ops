---
apiVersion: v1
kind: Service
metadata:
  name: hindsight-postgres
  labels:
    app.kubernetes.io/name: hindsight
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP
  selector:
    app.kubernetes.io/name: hindsight
    app.kubernetes.io/component: postgres
