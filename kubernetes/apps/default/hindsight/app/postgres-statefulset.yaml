---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hindsight-postgres
  labels:
    app.kubernetes.io/name: hindsight
    app.kubernetes.io/component: postgres
spec:
  serviceName: hindsight-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hindsight
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hindsight
        app.kubernetes.io/component: postgres
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: postgres
          image: tensorchord/vchord-suite:pg18-20260501
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: hindsight
            - name: POSTGRES_DB
              value: hindsight
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hindsight-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hindsight
                - -d
                - hindsight
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - hindsight
                - -d
                - hindsight
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hindsight-postgres
        - name: initdb
          configMap:
            name: hindsight-postgres-init
