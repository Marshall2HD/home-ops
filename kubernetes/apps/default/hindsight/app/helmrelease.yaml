---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hindsight
spec:
  chartRef:
    kind: OCIRepository
    name: hindsight
  interval: 1h
  timeout: 10m
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: hindsight-api
            patch: |-
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: hindsight-control-plane
            patch: |-
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
  values:
    fullnameOverride: hindsight
    version: 0.8.4
    existingSecret: hindsight-secret
    databaseUrl: "postgresql://hindsight:$(POSTGRES_PASSWORD_URI)@postgres.database.svc.cluster.local:5432/hindsight"

    postgresql:
      enabled: false

    worker:
      enabled: true
      replicaCount: 1
      image:
        repository: ghcr.io/vectorize-io/hindsight-api
        tag: 0.8.4
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 4Gi
      env:
        HINDSIGHT_API_PORT: "8889"

    podAnnotations:
      reloader.stakater.com/auto: "true"

    api:
      image:
        repository: ghcr.io/vectorize-io/hindsight-api
        tag: 0.8.4
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 12Gi
      persistence:
        modelCache:
          enabled: true
          storageClass: ceph-block
          size: 5Gi
      env:
        HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP: "true"
        HINDSIGHT_API_DATABASE_SCHEMA: public
        HINDSIGHT_API_DB_COMMAND_TIMEOUT: "300"
        HINDSIGHT_API_DB_POOL_MIN_SIZE: "2"
        HINDSIGHT_API_DB_POOL_MAX_SIZE: "20"
        HINDSIGHT_API_READ_DB_POOL_MIN_SIZE: "2"
        HINDSIGHT_API_READ_DB_POOL_MAX_SIZE: "20"
        HINDSIGHT_API_RETAIN_MAX_CONCURRENT: "1"
        HINDSIGHT_API_VECTOR_EXTENSION: vchord
        HINDSIGHT_API_TEXT_SEARCH_EXTENSION: vchord

        HINDSIGHT_API_LLM_PROVIDER: openrouter
        HINDSIGHT_API_LLM_MODEL: openai/gpt-5.4-mini
        HINDSIGHT_API_LLM_EXTRA_BODY: '{}'
        HINDSIGHT_API_RETAIN_LLM_MODEL: openai/gpt-5.4-mini
        HINDSIGHT_API_REFLECT_LLM_MODEL: openai/gpt-5.4-mini
        HINDSIGHT_API_CONSOLIDATION_LLM_MODEL: openai/gpt-5.4-mini
        HINDSIGHT_API_LLM_MAX_CONCURRENT: "1"
        HINDSIGHT_API_RETAIN_LLM_MAX_CONCURRENT: "1"
        HINDSIGHT_API_REFLECT_LLM_MAX_CONCURRENT: "1"
        HINDSIGHT_API_CONSOLIDATION_LLM_MAX_CONCURRENT: "1"
        HINDSIGHT_API_WORKER_MAX_SLOTS: "3"

        HINDSIGHT_API_EMBEDDINGS_PROVIDER: litellm-sdk
        HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_MODEL: voyage/voyage-4-large
        HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_OUTPUT_DIMENSIONS: "2048"
        HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_ENCODING_FORMAT: ""

        HINDSIGHT_API_RERANKER_PROVIDER: litellm
        HINDSIGHT_API_RERANKER_LITELLM_API_BASE: https://api.spark.nix.casa/v1
        HINDSIGHT_API_RERANKER_LITELLM_MODEL: zerank-2
        HINDSIGHT_API_RERANKER_LITELLM_TIMEOUT: "120"
        HINDSIGHT_API_LAZY_RERANKER: "true"

        HINDSIGHT_API_DISPOSITION_SKEPTICISM: "4"
        HINDSIGHT_API_DISPOSITION_LITERALISM: "2"
        HINDSIGHT_API_DISPOSITION_EMPATHY: "4"

        HINDSIGHT_API_AUDIT_LOG_ENABLED: "true"
        HINDSIGHT_API_METRICS_INCLUDE_BANK_ID: "true"
        HINDSIGHT_API_OTEL_TRACES_ENABLED: "true"
        HINDSIGHT_API_OTEL_EXPORTER_OTLP_ENDPOINT: "https://langfuse.hades.casa/api/public/otel"
        HINDSIGHT_API_OTEL_SERVICE_NAME: "hindsight-api"
      livenessProbe:
        httpGet:
          path: /health
          port: 8888
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /health
          port: 8888
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 12

    controlPlane:
      image:
        repository: ghcr.io/vectorize-io/hindsight-control-plane
        tag: 0.8.4
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 4Gi
      env:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
        HINDSIGHT_CP_HOSTNAME: "0.0.0.0"
        HINDSIGHT_CP_PORT: "3000"
