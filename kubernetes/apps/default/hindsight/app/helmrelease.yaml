---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hindsight
spec:
  chartRef:
    kind: OCIRepository
    name: hindsight
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: hindsight-api
            patch: |-
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: hindsight-control-plane
            patch: |-
              - op: add
                path: /spec/strategy
                value:
                  type: RollingUpdate
                  rollingUpdate:
                    maxSurge: 0
                    maxUnavailable: 1
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: hindsight-api
            patch: |-
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: patch-migrations
                    image: ghcr.io/vectorize-io/hindsight-api:0.7.1
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        cp -r /app/api/. /tmp/api-code/
                        python - <<'PY'
                        from pathlib import Path

                        migrations = Path('/tmp/api-code/hindsight_api/migrations.py')
                        migrations.write_text(
                            migrations.read_text().replace(
                                'SELECT data_type',
                                "SELECT CASE WHEN data_type = 'USER-DEFINED' THEN udt_name ELSE data_type END AS data_type",
                            )
                        )

                        db_utils = Path('/tmp/api-code/hindsight_api/engine/db_utils.py')
                        text = db_utils.read_text()
                        start = text.index('    if isinstance(backend_or_pool, DatabaseBackend) or getattr(backend_or_pool, "_wraps_backend", False):')
                        end = text.index('    else:\n        # Legacy path: raw asyncpg.Pool', start)
                        replacement = '''\
                            if isinstance(backend_or_pool, DatabaseBackend) or getattr(backend_or_pool, "_wraps_backend", False):
                                # Use the backend's acquire context manager with retry. Only retry connection
                                # acquisition, never exceptions raised by the caller inside the yielded block.
                                start = time.time()
                                last_exception = None
                                acquire_cm = None
                                conn = None
                                for attempt in range(max_retries + 1):
                                    try:
                                        acquire_cm = backend_or_pool.acquire()
                                        conn = await acquire_cm.__aenter__()
                                        acquire_time = time.time() - start
                                        if acquire_time > 0.05:
                                            logger.warning(f"[DB POOL] Slow acquire: {acquire_time:.3f}s")
                                        break
                                    except Exception as e:
                                        if not _is_retryable(e):
                                            raise
                                        last_exception = e
                                        if attempt < max_retries:
                                            delay = min(DEFAULT_BASE_DELAY * (2**attempt), DEFAULT_MAX_DELAY)
                                            logger.warning(
                                                f"Database acquire failed (attempt {attempt + 1}/{max_retries + 1}): {e}. "
                                                f"Retrying in {delay:.1f}s..."
                                            )
                                            await asyncio.sleep(delay)
                                        else:
                                            logger.error(f"Database acquire failed after {max_retries + 1} attempts: {e}")
                                if conn is None:
                                    raise last_exception

                                exc_info = (None, None, None)
                                try:
                                    try:
                                        yield conn
                                    except BaseException as e:
                                        exc_info = (type(e), e, e.__traceback__)
                                        raise
                                finally:
                                    await acquire_cm.__aexit__(*exc_info)
                                return
                        '''
                        db_utils.write_text(text[:start] + replacement + text[end:])
                        PY
                        echo "Patched migrations.py and db_utils.py"
                    volumeMounts:
                      - name: api-code
                        mountPath: /tmp/api-code
              - op: add
                path: /spec/template/spec/volumes
                value:
                  - name: api-code
                    emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts
                value:
                  - name: api-code
                    mountPath: /app/api
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: hindsight-worker
            patch: |-
              - op: add
                path: /spec/template/spec/initContainers
                value:
                  - name: patch-db-utils
                    image: ghcr.io/vectorize-io/hindsight-api:0.7.1
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        cp -r /app/api/. /tmp/api-code/
                        python - <<'PY'
                        from pathlib import Path

                        db_utils = Path('/tmp/api-code/hindsight_api/engine/db_utils.py')
                        text = db_utils.read_text()
                        start = text.index('    if isinstance(backend_or_pool, DatabaseBackend) or getattr(backend_or_pool, "_wraps_backend", False):')
                        end = text.index('    else:\n        # Legacy path: raw asyncpg.Pool', start)
                        replacement = '''\
                            if isinstance(backend_or_pool, DatabaseBackend) or getattr(backend_or_pool, "_wraps_backend", False):
                                # Use the backend's acquire context manager with retry. Only retry connection
                                # acquisition, never exceptions raised by the caller inside the yielded block.
                                start = time.time()
                                last_exception = None
                                acquire_cm = None
                                conn = None
                                for attempt in range(max_retries + 1):
                                    try:
                                        acquire_cm = backend_or_pool.acquire()
                                        conn = await acquire_cm.__aenter__()
                                        acquire_time = time.time() - start
                                        if acquire_time > 0.05:
                                            logger.warning(f"[DB POOL] Slow acquire: {acquire_time:.3f}s")
                                        break
                                    except Exception as e:
                                        if not _is_retryable(e):
                                            raise
                                        last_exception = e
                                        if attempt < max_retries:
                                            delay = min(DEFAULT_BASE_DELAY * (2**attempt), DEFAULT_MAX_DELAY)
                                            logger.warning(
                                                f"Database acquire failed (attempt {attempt + 1}/{max_retries + 1}): {e}. "
                                                f"Retrying in {delay:.1f}s..."
                                            )
                                            await asyncio.sleep(delay)
                                        else:
                                            logger.error(f"Database acquire failed after {max_retries + 1} attempts: {e}")
                                if conn is None:
                                    raise last_exception

                                exc_info = (None, None, None)
                                try:
                                    try:
                                        yield conn
                                    except BaseException as e:
                                        exc_info = (type(e), e, e.__traceback__)
                                        raise
                                finally:
                                    await acquire_cm.__aexit__(*exc_info)
                                return
                        '''
                        db_utils.write_text(text[:start] + replacement + text[end:])
                        PY
                        echo "Patched db_utils.py"
                    volumeMounts:
                      - name: api-code
                        mountPath: /tmp/api-code
              - op: add
                path: /spec/template/spec/volumes
                value:
                  - name: api-code
                    emptyDir: {}
              - op: add
                path: /spec/template/spec/containers/0/volumeMounts
                value:
                  - name: api-code
                    mountPath: /app/api
  values:
    fullnameOverride: hindsight
    version: 0.7.1
    existingSecret: hindsight-secret
    databaseUrl: "postgresql://hindsight:$(POSTGRES_PASSWORD_URI)@postgres.default.svc.cluster.local:5432/hindsight"

    postgresql:
      enabled: false

    worker:
      enabled: true
      replicaCount: 1
      image:
        repository: ghcr.io/vectorize-io/hindsight-api
        tag: 0.7.1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 4Gi
      env:
        HINDSIGHT_API_PORT: "8889"

    podAnnotations:
      reloader.stakater.com/auto: "true"

    api:
      image:
        repository: ghcr.io/vectorize-io/hindsight-api
        tag: 0.7.1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 12Gi
      persistence:
        modelCache:
          enabled: true
          storageClass: ceph-block
          size: 5Gi
      env:
        HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP: "true"
        HINDSIGHT_API_DATABASE_SCHEMA: public
        HINDSIGHT_API_DB_COMMAND_TIMEOUT: "300"
        HINDSIGHT_API_RETAIN_MAX_CONCURRENT: "1"
        HINDSIGHT_API_VECTOR_EXTENSION: vchord
        HINDSIGHT_API_TEXT_SEARCH_EXTENSION: vchord

        HINDSIGHT_API_LLM_PROVIDER: openrouter
        HINDSIGHT_API_LLM_MODEL: openai/gpt-oss-20b
        HINDSIGHT_API_LLM_BASE_URL: https://openrouter.ai/api/v1
        HINDSIGHT_API_LLM_DEFAULT_HEADERS: '{"X-Whois":"hindsight-api-home-ops","X-Application":"hindsight-api-home-ops"}'
        HINDSIGHT_API_LLM_EXTRA_BODY: '{"provider":{"only":["Groq"]}}'
        HINDSIGHT_API_LLM_MAX_CONCURRENT: "3"

        HINDSIGHT_API_EMBEDDINGS_PROVIDER: litellm-sdk
        HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_MODEL: voyage/voyage-4-large
        HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_OUTPUT_DIMENSIONS: "2048"
        HINDSIGHT_API_EMBEDDINGS_LITELLM_SDK_ENCODING_FORMAT: ""
        HINDSIGHT_API_RERANKER_PROVIDER: local
        HINDSIGHT_API_LAZY_RERANKER: "true"

        HINDSIGHT_API_DISPOSITION_SKEPTICISM: "4"
        HINDSIGHT_API_DISPOSITION_LITERALISM: "2"
        HINDSIGHT_API_DISPOSITION_EMPATHY: "4"

        HINDSIGHT_API_AUDIT_LOG_ENABLED: "true"
        HINDSIGHT_API_METRICS_INCLUDE_BANK_ID: "true"
        HINDSIGHT_API_OTEL_TRACES_ENABLED: "true"
        HINDSIGHT_API_OTEL_EXPORTER_OTLP_ENDPOINT: "https://langfuse.hades.casa/api/public/otel"
        HINDSIGHT_API_OTEL_SERVICE_NAME: "hindsight-api"

        HINDSIGHT_CP_DATAPLANE_API_URL: "https://ui.hindsight.hades.casa"
      livenessProbe:
        httpGet:
          path: /health
          port: 8888
        initialDelaySeconds: 60
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
      readinessProbe:
        httpGet:
          path: /health
          port: 8888
        initialDelaySeconds: 20
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 12

    controlPlane:
      image:
        repository: ghcr.io/vectorize-io/hindsight-control-plane
        tag: 0.7.1
      resources:
        requests:
          cpu: 50m
          memory: 512Mi
        limits:
          memory: 4Gi
      env:
        NODE_ENV: production
        NEXT_TELEMETRY_DISABLED: "1"
        HINDSIGHT_CP_HOSTNAME: "0.0.0.0"
        HINDSIGHT_CP_PORT: "3000"
