---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app librechat
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  values:
    librechat:
      configEnv:
        ENDPOINTS: "openAI,agents,assistants,azureOpenAI,google,anthropic,bingAI,custom"
        CUSTOM_FOOTER: "Copyright © 2026 Nyx. All rights reserved."
        DEBUG_PLUGINS: "false"
        MEILI_NO_ANALYTICS: "true"
        ALLOW_REGISTRATION: "false"
      existingSecretName: librechat-credentials-env
      configYamlContent: |
        version: 1.3.4
        cache: true
        endpoints:
          custom:
            - name: "Deepseek"
              apiKey: "$${DEEPSEEK_API_KEY}"
              baseURL: "https://api.deepseek.com/v1"
              models:
                default: ["deepseek-chat", "deepseek-reasoner"]
                fetch: false
              titleConvo: true
              titleModel: "deepseek-chat"
              modelDisplayLabel: "Deepseek"

            - name: "OpenRouter"
              apiKey: "$${OPENROUTER_KEY}"
              baseURL: "https://openrouter.ai/api/v1"
              models:
                default: ["anthropic/claude-sonnet-4.6"]
                fetch: true
              titleConvo: true
              titleModel: "anthropic/claude-haiku-4.5"
              dropParams: ["stop"]
              modelDisplayLabel: "OpenRouter"

            - name: "Moonshot"
              apiKey: "$${MOONSHOT_API_KEY}"
              baseURL: "https://api.moonshot.ai/v1"
              models:
                default: ["kimi-k2.5"]
                fetch: true
              titleConvo: true
              titleModel: "kimi-k2.5"
              modelDisplayLabel: "Moonshot"

            - name: "VLLM"
              apiKey: "none"
              baseURL: "http://vllm-vllm-stack-router.default.svc.cluster.local/v1"
              models:
                default: ["Qwen/Qwen3.5-9B"]
                fetch: true
              titleConvo: true
              titleModel: "Qwen/Qwen3.5-9B"
              modelDisplayLabel: "VLLM"

            - name: "Metaxu"
              apiKey: "oauth"
              baseURL: "https://metaxu.nix.casa/v1"
              models:
                default: ["claude-opus-4-6", "claude-sonnet-4-6", "claude-haiku-4-5"]
                fetch: true
              titleConvo: true
              titleModel: "claude-haiku-4-5"
              modelDisplayLabel: "Metaxu"

        speech:
          tts:
            elevenlabs:
              apiKey: '$${ELEVENLABS_API_KEY}'
              model: 'eleven_v3'
              voices:
                - 'm3yAHyFEFKtbCIM5n7GF'  # Ash
                - 'WtA85syCrJwasGeHGH2p'  # Ember
                - 'xNtG3W2oqJs0cJZuTyBc'  # Chloe
                - 'nDJIICjR9zfJExIFeSCN'  # Emmaline
                - '54Cze5LrTSyLgbO6Fhlc'  # Cat
                - '56bWURjYFHyYyVf490Dp'  # Emma
                - 'lcMyyd2HUfFzxdCaC4Ta'  # Lucy
                - '4tRn1lSkEn13EVTuqb0g'  # Serafina
                - 'k7EgWWVjhSqofE4pWBQp'  # Artemis (custom)
                - 'g16aPq2qEOrGJ6r4hIXP'  # Necro (custom)
                - 'YiFO1DkSpmfVSGxQ4aUi'  # Deadlock (custom)
          speechTab:
            conversationMode: true
            advancedMode: false
            speechToText:
              engineSTT: "browser"
              languageSTT: "English (US)"
              autoTranscribeAudio: true
              decibelValue: -45
              autoSendText: 0
            textToSpeech:
              engineTTS: "elevenlabs"
              voice: "m3yAHyFEFKtbCIM5n7GF"
              languageTTS: "en"
              automaticPlayback: false
              playbackRate: 1.0
              cacheTTS: true
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        memory: 1Gi
    librechat-rag-api:
      enabled: false
    mongodb:
      global:
        security:
          allowInsecureImages: true
      image:
        registry: registry-1.docker.io
        repository: bitnami/mongodb
        tag: latest
      readinessProbe:
        timeoutSeconds: 10
      persistence:
        existingClaim: librechat-mongodb
