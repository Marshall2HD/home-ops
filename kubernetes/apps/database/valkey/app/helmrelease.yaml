---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: valkey
spec:
  chartRef:
    kind: OCIRepository
    name: valkey
  interval: 1h
  values:
    controllers:
      valkey:
        type: statefulset
        containers:
          app:
            image:
              repository: docker.io/valkey/valkey
              tag: 9-alpine@sha256:ee91f7a174ac4d6a6b0685b3a60e321f0a9dbbb691f9b0e285be2ba1d1be8328
            command:
              - /bin/sh
              - -ec
              - exec valkey-server --appendonly yes --dir /data --requirepass "$VALKEY_PASSWORD" --maxmemory-policy noeviction
            env:
              VALKEY_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: valkey-secret
                    key: VALKEY_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -ec
                      - valkey-cli -a "$VALKEY_PASSWORD" ping | grep -q PONG
                  initialDelaySeconds: 20
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -ec
                      - valkey-cli -a "$VALKEY_PASSWORD" ping | grep -q PONG
                  initialDelaySeconds: 5
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          redis:
            port: 6379
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /data
